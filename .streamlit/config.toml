[theme]
primaryColor = "#F63366"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#262730"
textColor = "#FAFAFA"
font = "sans serif"

[server]
maxUploadSize = 10
enableCORS = true
enableXsrfProtection = true
headless = true
port = 8501
address = "0.0.0.0"

[browser]
gatherUsageStats = false

[logger]
level = "error"
