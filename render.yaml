services:
  - type: web
    name: bensdorp-trading-strategies
    runtime: python
    repo: https://github.com/tuo-username/tuo-repo-name  # Modifica con il tuo repo
    plan: free
    region: oregon
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port=8501 --server.address=0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
